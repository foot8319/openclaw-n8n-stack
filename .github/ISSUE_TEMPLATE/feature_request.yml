name: Feature Request
description: Suggest a new workflow or configuration improvement
title: "[FEATURE] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Please describe what you'd like to see added.
  - type: textarea
    id: problem
    attributes:
      label: Problem / Use Case
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
    validations:
      required: true
