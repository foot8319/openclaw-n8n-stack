name: Bug Report
description: Something isn't working correctly
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the sections below.
  - type: input
    id: docker-version
    attributes:
      label: Docker Version
      placeholder: "e.g. Docker 27.0, Compose v2.29"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Container Logs
      description: "Run: docker compose logs --tail=50"
      render: text
